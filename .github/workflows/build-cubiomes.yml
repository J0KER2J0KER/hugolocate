name: Build cubiomes native libraries

on:
  push:
    paths:
      - 'src/main/native/**'
      - '.github/workflows/build-cubiomes.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Compile cubiomes + wrapper
        shell: bash
        working-directory: src/main/native
        run: |
          gcc -shared -o hugolocate_wrapper.dll hugolocate_wrapper.c cubiomes/noise.c cubiomes/biomes.c cubiomes/layers.c cubiomes/biomenoise.c cubiomes/generator.c cubiomes/finders.c cubiomes/util.c cubiomes/quadbase.c -I cubiomes -O3
      - uses: actions/upload-artifact@v4
        with:
          name: win32-x86-64
          path: src/main/native/hugolocate_wrapper.dll

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Compile cubiomes + wrapper
        working-directory: src/main/native
        run: |
          gcc -shared -fPIC -o libhugolocate_wrapper.so hugolocate_wrapper.c cubiomes/noise.c cubiomes/biomes.c cubiomes/layers.c cubiomes/biomenoise.c cubiomes/generator.c cubiomes/finders.c cubiomes/util.c cubiomes/quadbase.c -I cubiomes -O3
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86-64
          path: src/main/native/libhugolocate_wrapper.so

  build-macos-arm:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Compile cubiomes + wrapper
        working-directory: src/main/native
        run: |
          gcc -shared -fPIC -o libhugolocate_wrapper.dylib hugolocate_wrapper.c cubiomes/noise.c cubiomes/biomes.c cubiomes/layers.c cubiomes/biomenoise.c cubiomes/generator.c cubiomes/finders.c cubiomes/util.c cubiomes/quadbase.c -I cubiomes -O3
      - uses: actions/upload-artifact@v4
        with:
          name: darwin-aarch64
          path: src/main/native/libhugolocate_wrapper.dylib

  build-macos-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Compile cubiomes + wrapper
        working-directory: src/main/native
        run: |
          gcc -shared -fPIC -o libhugolocate_wrapper.dylib hugolocate_wrapper.c cubiomes/noise.c cubiomes/biomes.c cubiomes/layers.c cubiomes/biomenoise.c cubiomes/generator.c cubiomes/finders.c cubiomes/util.c cubiomes/quadbase.c -I cubiomes -O3
      - uses: actions/upload-artifact@v4
        with:
          name: darwin-x86-64
          path: src/main/native/libhugolocate_wrapper.dylib